<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>AI 실시간 통역 ver3</title>

<style>

body{
background:#000;
color:white;
font-family:Arial;
margin:0;
overflow:hidden;
}

#header{
position:fixed;
top:20px;
left:20px;
font-size:18px;
}

#version{
color:#00FF9C;
margin-left:8px;
}

#subtitleBox{

position:absolute;
bottom:0;
width:100%;
height:70%;
overflow-y:auto;
padding:40px;
text-align:center;

}

.block{
margin:30px 0;
}

.kr{

font-size:42px;
color:#00FF9C;
font-weight:bold;

max-width:1100px;
margin:auto;

line-height:1.4;

word-break:keep-all;
white-space:normal;

}

</style>

</head>

<body>

<div id="header">
🎤 AI 실시간 통역 <span id="version">ver3</span>
<span id="status">🟢 대기중 (F1 시작)</span>
</div>

<div id="subtitleBox"></div>

<script>

let recognition
let running=false
let lastSentence=""

function start(){

if(running) return

running=true

document.getElementById("status").innerText=" 🔴 통역중 (F1 멈춤)"

recognition=new (window.SpeechRecognition||window.webkitSpeechRecognition)()

recognition.lang="zh-CN"
recognition.continuous=true
recognition.interimResults=false
recognition.maxAlternatives=1

recognition.start()

recognition.onresult=function(event){

let sentence=event.results[event.results.length-1][0].transcript

if(sentence===lastSentence) return

lastSentence=sentence

translate(sentence)

}

recognition.onend=function(){

if(running){
recognition.start()
}

}

}

function stop(){

running=false
recognition.stop()

document.getElementById("status").innerText=" 🟢 대기중 (F1 시작)"

}

async function translate(text){

let url=`https://translate.googleapis.com/translate_a/single?client=gtx&sl=zh-CN&tl=ko&dt=t&q=${encodeURIComponent(text)}`

let res=await fetch(url)

let data=await res.json()

let translated=data[0][0][0]

addSubtitle(translated)

}

function addSubtitle(kr){

let box=document.getElementById("subtitleBox")

let block=document.createElement("div")
block.className="block"

let krDiv=document.createElement("div")
krDiv.className="kr"
krDiv.innerText=kr

block.appendChild(krDiv)

box.appendChild(block)

box.scrollTop=box.scrollHeight

}

document.addEventListener("keydown",function(e){

if(e.key==="F1"){

e.preventDefault()

if(running){
stop()
}else{
start()
}

}

})

</script>

</body>
</html>

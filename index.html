<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>AI 실시간 통역 ver11.2</title>

<style>
body{
  background:#000;
  color:white;
  font-family:Arial, sans-serif;
  margin:0;
  overflow:hidden;
}

#header{
  position:fixed;
  top:20px;
  left:20px;
  font-size:18px;
  z-index:10;
}

#version{
  color:#00FF9C;
  margin-left:8px;
}

#status{
  margin-left:10px;
}

#controls{
  margin-top:12px;
}

#controls button{
  font-size:26px;
  padding:18px 40px;
  margin-right:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

#startBtn{
  background:#00FF9C;
  color:#000;
}

#stopBtn{
  background:#ff4d4d;
  color:#fff;
}

#clearBtn{
  background:#555;
  color:#fff;
}

#controls button:hover{
  opacity:0.85;
}

#subtitleBox{
  position:absolute;
  bottom:0;
  width:100%;
  height:70%;
  overflow-y:auto;
  padding:40px;
  text-align:center;
  box-sizing:border-box;
}

.subtitle{
  font-size:44px;
  color:#00FF9C;
  font-weight:bold;
  max-width:900px;
  margin:22px auto;
  line-height:1.55;
  word-break:keep-all;
  letter-spacing:0.5px;
  white-space:pre-line;
}
</style>
</head>

<body>

<div id="header">
  🎤 AI 실시간 통역 <span id="version">ver11.2</span>
  <span id="status">🟢 대기중 (F1 시작)</span>

  <div id="controls">
    <button id="startBtn" onclick="start()">시작</button>
    <button id="stopBtn" onclick="stop()">중지</button>
    <button id="clearBtn" onclick="clearSubtitle()">초기화</button>
  </div>
</div>

<div id="subtitleBox"></div>

<script>
let recognition;
let running = false;
let translating = false;
let lastSentence = "";
let queue = [];

/* 감탄사 + 문장부호 제거 */
function cleanText(text){
  return text
    .replace(/^(啊|嗯|哦|这个|那个|然后|所以|就是|음|아|어)+/g, "")
    .replace(/[.,!?。，！？…—-]/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

/* 긴 문장 줄 분리 */
function splitSentence(text){
  if(text.length > 35){
    text = text.replace(/(그리고|하지만|그래서|또|또한)/g, "\n$1");
  }
  return text;
}

function start(){
  if(running) return;

  running = true;
  document.getElementById("status").innerText = "🔴 통역중 (F1 멈춤)";

  recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "zh-CN";
  recognition.continuous = true;
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.start();

  recognition.onresult = function(event){
    let sentence = event.results[event.results.length - 1][0].transcript;

    sentence = cleanText(sentence);

    if(sentence.length < 2) return;
    if(sentence === lastSentence) return;

    lastSentence = sentence;
    queue.push(sentence);
    processQueue();
  };

  recognition.onend = function(){
    if(running){
      try{
        recognition.start();
      }catch(e){}
    }
  };

  recognition.onerror = function(){
    // 오류 문구 표시 안 함
  };
}

function stop(){
  running = false;

  if(recognition){
    try{
      recognition.stop();
    }catch(e){}
  }

  document.getElementById("status").innerText = "🟢 대기중 (F1 시작)";
}

/* 번역 큐 */
async function processQueue(){
  if(translating) return;
  if(queue.length === 0) return;

  translating = true;

  const text = queue.shift();

  try{
    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=zh-CN&tl=ko&dt=t&q=${encodeURIComponent(text)}`;
    const res = await fetch(url);
    const data = await res.json();

    let translated = data?.[0]?.map(item => item[0]).join("") || "";
    translated = splitSentence(translated);
    translated = cleanText(translated);

    if(translated.length >= 2){
      addSubtitle(translated);
    }
  }catch(e){
    addSubtitle("번역 오류");
  }

  translating = false;
  processQueue();
}

/* 자막 추가 */
function addSubtitle(text){
  const box = document.getElementById("subtitleBox");

  const div = document.createElement("div");
  div.className = "subtitle";
  div.innerText = text;

  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

/* 자막 초기화 */
function clearSubtitle(){
  document.getElementById("subtitleBox").innerHTML = "";
}

/* F1 시작/중지 */
document.addEventListener("keydown", function(e){
  if(e.key === "F1"){
    e.preventDefault();

    if(running){
      stop();
    }else{
      start();
    }
  }
});
</script>

</body>
</html>

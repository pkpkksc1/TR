<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>AI 실시간 통역 ver1</title>

<style>

body{
background:#000;
color:white;
font-family:Arial;
margin:0;
overflow:hidden;
}

#header{
position:fixed;
top:20px;
left:20px;
font-size:18px;
}

#version{
color:#00FF9C;
margin-left:10px;
}

#subtitleBox{

position:absolute;
bottom:0;
width:100%;
height:70%;
overflow-y:auto;
padding:40px;
text-align:center;

}

.block{
margin:25px 0;
}

.kr{
font-size:44px;
color:#00FF9C;
font-weight:bold;
}

</style>
</head>

<body>

<div id="header">
🎤 AI 실시간 통역 
<span id="version">ver1</span>
<span id="status">🟢 대기중 (F1 시작)</span>
</div>

<div id="subtitleBox"></div>

<script>

let recognition
let running=false
let lastText=""

function start(){

if(running) return

running=true

document.getElementById("status").innerText=" 🔴 통역중 (F1 멈춤)"

recognition=new (window.SpeechRecognition||window.webkitSpeechRecognition)()

recognition.lang="zh-CN"
recognition.continuous=true
recognition.interimResults=true

recognition.maxAlternatives = 1

recognition.start()

recognition.onresult=function(event){

let text=""

for(let i=event.resultIndex;i<event.results.length;i++){

text+=event.results[i][0].transcript

}

processText(text)

}

recognition.onend=function(){

if(running){
recognition.start()
}

}

}

function stop(){

running=false

document.getElementById("status").innerText=" 🟢 대기중 (F1 시작)"

recognition.stop()

}

function processText(text){

if(text===lastText) return

lastText=text

translate(text)

}

async function translate(text){

if(text.trim().length<2) return

let url=`https://translate.googleapis.com/translate_a/single?client=gtx&sl=zh-CN&tl=ko&dt=t&q=${encodeURIComponent(text)}`

let res=await fetch(url)

let data=await res.json()

let translated=data[0][0][0]

addSubtitle(translated)

}

function addSubtitle(kr){

let box=document.getElementById("subtitleBox")

let block=document.createElement("div")
block.className="block"

let krDiv=document.createElement("div")
krDiv.className="kr"
krDiv.innerText=kr

block.appendChild(krDiv)

box.appendChild(block)

box.scrollTop=box.scrollHeight

}

document.addEventListener("keydown",function(e){

if(e.key==="F1"){

e.preventDefault()

if(running){
stop()
}else{
start()
}

}

})

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>AI 실시간 통역 자막</title>

<style>

body{
background:#000;
color:white;
font-family:Arial;
margin:0;
overflow:hidden;
}

#status{
position:fixed;
top:20px;
left:20px;
font-size:18px;
}

#subtitleBox{

position:absolute;
bottom:0;
width:100%;
height:65%;

overflow-y:auto;

padding:40px;

}

.block{

margin:30px 0;
text-align:center;

}

.cn{

font-size:36px;
color:#6EC1FF;

}

.kr{

font-size:40px;
color:#00FF9C;
font-weight:bold;

}

</style>

</head>

<body>

<div id="status">🟢 대기중 (F1 시작)</div>

<div id="subtitleBox"></div>

<script>

let recognition
let running=false
let currentBlock=null
let lastText=""

function start(){

if(running) return

running=true

document.getElementById("status").innerText="🔴 통역 중 (F1 멈춤)"

recognition=new (window.SpeechRecognition||window.webkitSpeechRecognition)()

recognition.lang="zh-CN"
recognition.continuous=true
recognition.interimResults=true

recognition.start()

recognition.onresult=function(event){

let interim=""
let final=""

for(let i=event.resultIndex;i<event.results.length;i++){

let text=event.results[i][0].transcript

if(event.results[i].isFinal){

final+=text

}else{

interim+=text

}

}

if(interim){

updateInterim(interim)

}

if(final){

commitFinal(final)

}

}

recognition.onend=function(){

if(running){
recognition.start()
}

}

}

function stop(){

running=false

document.getElementById("status").innerText="🟢 대기중 (F1 시작)"

if(recognition){
recognition.stop()
}

}

function createBlock(){

let box=document.getElementById("subtitleBox")

let block=document.createElement("div")
block.className="block"

let cn=document.createElement("div")
cn.className="cn"

let kr=document.createElement("div")
kr.className="kr"

block.appendChild(cn)
block.appendChild(kr)

box.appendChild(block)

return {block,cn,kr}

}

function updateInterim(text){

if(!currentBlock){

currentBlock=createBlock()

}

currentBlock.cn.innerText=text

scrollBottom()

}

async function commitFinal(text){

if(!currentBlock){

currentBlock=createBlock()

}

currentBlock.cn.innerText=text

let translated=await translate(text)

currentBlock.kr.innerText=translated

currentBlock=null

scrollBottom()

}

async function translate(text){

let url=`https://translate.googleapis.com/translate_a/single?client=gtx&sl=zh-CN&tl=ko&dt=t&q=${encodeURIComponent(text)}`

let res=await fetch(url)

let data=await res.json()

return data[0][0][0]

}

function scrollBottom(){

let box=document.getElementById("subtitleBox")

box.scrollTop=box.scrollHeight

}

/* F1 단축키 */

document.addEventListener("keydown",function(e){

if(e.key==="F1"){

e.preventDefault()

if(running){
stop()
}else{
start()
}

}

})

</script>

</body>
</html>

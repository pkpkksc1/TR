<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>AI 실시간 통역 ver11</title>

<style>

body{
background:#000;
color:white;
font-family:Arial;
margin:0;
overflow:hidden;
}

#header{
position:fixed;
top:20px;
left:20px;
font-size:18px;
}

#version{
color:#00FF9C;
margin-left:8px;
}

#subtitleBox{

position:absolute;
bottom:0;
width:100%;
height:70%;

overflow-y:auto;

padding:40px;

text-align:center;

}

/* 가독성 개선 */

.subtitle{

font-size:44px;
color:#00FF9C;
font-weight:bold;

max-width:900px;
margin:22px auto;

line-height:1.55;

word-break:keep-all;

letter-spacing:0.5px;

}

</style>

</head>

<body>

<div id="header">
🎤 AI 실시간 통역 <span id="version">ver11</span>
<span id="status">🟢 대기중 (F1 시작)</span>
</div>

<div id="subtitleBox"></div>

<script>

let recognition
let running=false
let translating=false
let lastSentence=""
let queue=[]

/* 감탄사 + 문장부호 제거 */

function cleanText(text){

return text
.replace(/^(啊|嗯|哦|这个|那个|然后|所以|就是|음|아|어)+/g,"")
.replace(/[.,!?。，！？…—-]/g,"")
.replace(/\s+/g," ")
.trim()

}

/* 긴 문장 줄 분리 */

function splitSentence(text){

if(text.length>35){

text=text.replace(/(그리고|하지만|그래서|또|또한)/g,"\n$1")

}

return text

}

function start(){

if(running) return

running=true

document.getElementById("status").innerText=" 🔴 통역중 (F1 멈춤)"

recognition=new (window.SpeechRecognition||window.webkitSpeechRecognition)()

recognition.lang="zh-CN"
recognition.continuous=true
recognition.interimResults=false
recognition.maxAlternatives=1

recognition.start()

recognition.onresult=function(event){

let sentence=event.results[event.results.length-1][0].transcript

sentence=cleanText(sentence)

if(sentence.length<2) return

if(sentence===lastSentence) return

lastSentence=sentence

queue.push(sentence)

processQueue()

}

recognition.onend=function(){

if(running){
recognition.start()
}

}

}

function stop(){

running=false
recognition.stop()

document.getElementById("status").innerText=" 🟢 대기중 (F1 시작)"

}

/* 번역 큐 */

async function processQueue(){

if(translating) return
if(queue.length===0) return

translating=true

let text=queue.shift()

let url=`https://translate.googleapis.com/translate_a/single?client=gtx&sl=zh-CN&tl=ko&dt=t&q=${encodeURIComponent(text)}`

let res=await fetch(url)

let data=await res.json()

let translated=data[0][0][0]

translated=splitSentence(translated)
translated=cleanText(translated)

addSubtitle(translated)

translating=false

processQueue()

}

/* 자막 추가 */

function addSubtitle(text){

let box=document.getElementById("subtitleBox")

let div=document.createElement("div")
div.className="subtitle"
div.innerText=text

box.appendChild(div)

box.scrollTop=box.scrollHeight

}

document.addEventListener("keydown",function(e){

if(e.key==="F1"){

e.preventDefault()

if(running){
stop()
}else{
start()
}

}

})

</script>

</body>
</html>
